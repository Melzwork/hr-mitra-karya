<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tes Selesai — PT Mitra Karya Texindo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F5F4F0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.card{background:#fff;border:1px solid #E0DED6;border-radius:16px;padding:3rem 2rem;width:100%;max-width:420px;text-align:center}
.icon{width:56px;height:56px;border-radius:50%;background:#E8F5EE;border:1px solid #7BBDA0;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem}
.icon svg{width:24px;height:24px}
h1{font-size:22px;font-weight:500;color:#1A1916;margin-bottom:.75rem}
p{font-size:14px;color:#6B6A64;line-height:1.7;margin-bottom:1rem}
.divider{height:1px;background:#F0EFE9;margin:1.5rem 0}
.note{font-size:12px;color:#9B9A94;line-height:1.6}
.logo{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#C8C6BC;margin-top:2rem}
</style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#1D6B3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <h1>Tes Selesai</h1>
  <p>Terima kasih atas partisipasi Anda dalam proses seleksi PT Mitra Karya Texindo.</p>
  <p>Jawaban Anda telah kami terima dan akan diproses oleh tim HR.</p>
  <div class="divider"></div>
  <p class="note">Hasil seleksi akan disampaikan oleh staf HR dalam waktu yang ditentukan.<br>Anda dapat menutup halaman ini.</p>
  <p class="logo">PT Mitra Karya Texindo</p>
</div>
</body>
</html>
