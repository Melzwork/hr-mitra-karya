{% extends "base.html" %}
{% block title %}Tambah User{% endblock %}
{% block page_title %}Tambah User{% endblock %}

{% block content %}
<div style="max-width:480px;">
<div class="card">
  <div class="card-header"><div class="card-title">Tambah Akun Baru</div></div>
  <div class="card-body">
    <form method="POST">
      <div class="form-group" style="margin-bottom:14px;">
        <label>Username <span class="required">*</span></label>
        <input type="text" name="username" required placeholder="Nama login (tidak bisa diubah)">
      </div>
      <div class="form-group" style="margin-bottom:14px;">
        <label>Nama Lengkap <span class="required">*</span></label>
        <input type="text" name="full_name" required placeholder="Nama yang tampil di sistem">
      </div>
      <div class="form-group" style="margin-bottom:14px;">
        <label>Role / Akses <span class="required">*</span></label>
        <select name="role" required>
          <option value="hr_staff">HR Staff</option>
          <option value="hr_head">HR Head</option>
          <option value="owner">Owner/Admin</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:20px;">
        <label>Password <span class="required">*</span></label>
        <input type="password" name="password" required minlength="6" placeholder="Minimal 6 karakter">
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <a href="{{ url_for('user_list') }}" class="btn btn-outline">Batal</a>
        <button type="submit" class="btn btn-primary">Tambah User</button>
      </div>
    </form>
  </div>
</div>
</div>
{% endblock %}
